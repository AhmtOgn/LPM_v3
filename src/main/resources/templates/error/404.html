<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .error-template {
            padding: 40px 15px;
            text-align: center;
            margin-top: 10%;
        }
        .error-actions {
            margin-top: 15px;
            margin-bottom: 15px;
        }
        .error-actions .btn {
            margin-right: 10px;
        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row">
        <div class="col-md-12">
            <div class="error-template shadow-sm bg-white rounded p-5">
                <div class="error-code">404</div>
                <h1 class="fw-bold">Page Not Found!</h1>
                <div class="error-details mb-4">
                    Unfortunately, the page you are looking for is no longer available; it may have been deleted or its address may have changed.
                </div>
                <div class="error-actions">
                    <a th:href="@{/}" class="btn btn-primary btn-lg">
                        <i class="bi bi-house-door-fill"></i> Go Back Mainpage
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5 text-center text-muted">
    <p>&copy; 2026 Library Place Management - Sakarya University</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
