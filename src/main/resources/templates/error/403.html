<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Access Denied - LPM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .error-container {
            margin-top: 10%;
        }
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: #dc3545;
        }
    </style>
</head>
<body>

<div class="container text-center error-container">
    <div class="row justify-content-center">
        <div class="col-md-6 card shadow p-5">
            <div class="error-code">403</div>
            <h1 class="display-5 fw-bold text-dark">Ooups, insufficient privilege!</h1>
            <p class="lead mb-4 text-muted">Sorry you can not access this page!</p>

            <hr class="my-4">

            <p>You do not have the necessary permission (ADMIN) to view this page.</p>

            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <a th:href="@{/}" class="btn btn-primary btn-lg px-4 gap-3">
                    <i class="bi bi-house-door"></i> Return Home
                </a>
                <a th:href="@{/login}" class="btn btn-outline-secondary btn-lg px-4">
                    <i class="bi bi-person-lock"></i> Login as Admin
                </a>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5 text-center text-muted">
    <p>&copy; 2026 Library Place Management - Sakarya University</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
