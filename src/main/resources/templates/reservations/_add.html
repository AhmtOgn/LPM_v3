<div class="modal fade" id="addReservationModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Add New Reservation</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!--
                    th:object="${reservation}" + th:field kullanıldığında
                    Spring, ReservationDTO'nun getter'larını çağırır.
                    @DateTimeFormat(pattern = "yyyy-MM-dd'T'HH:mm") DTO'da tanımlı.
                -->
                <form th:action="@{/reservation/add}" th:object="${reservation}" method="post">

                    <!--
                        BUG FIX (Controller): addReservation GET'te "place" → "places" ve
                        "students" eksikti. Her iki değişken de controller'da eklendi.
                        USER rolü kendi adına rezervasyon yapar (service halleder),
                        ADMIN ise istediği öğrenci için yapabilir.
                    -->
                    <div class="mb-3" sec:authorize="hasRole('ADMIN')"
                         xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                        <label class="form-label">Student (Admin only)</label>
                        <select th:field="*{studentId}" class="form-select">
                            <option value="">Select Student...</option>
                            <option th:each="s : ${students}"
                                    th:value="${s.id}"
                                    th:text="${s.name + ' (' + s.username + ')'}">
                            </option>
                        </select>
                    </div>

                    <!-- BUG FIX: Controller'da "place" → "places" düzeltildi -->
                    <div class="mb-3">
                        <label class="form-label">Place</label>
                        <select th:field="*{placeId}" class="form-select" required>
                            <option value="">Select Place...</option>
                            <option th:each="p : ${places}"
                                    th:value="${p.id}"
                                    th:text="${p.building + ' - ' + p.room}">
                            </option>
                        </select>
                    </div>

                    <!-- BUG FIX: name="date" → th:field="*{startTime}" -->
                    <div class="mb-3">
                        <label class="form-label">Start Date & Time</label>
                        <input type="datetime-local" th:field="*{startTime}"
                               class="form-control" required>
                    </div>

                    <!-- BUG FIX: name="duration" → th:field="*{endTime}" -->
                    <div class="mb-3">
                        <label class="form-label">End Date & Time</label>
                        <input type="datetime-local" th:field="*{endTime}"
                               class="form-control" required>
                    </div>

                    <div class="modal-footer px-0 pb-0">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
