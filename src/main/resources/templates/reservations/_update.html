<div class="modal fade" id="updateReservationModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title">Update Reservation</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form th:action="@{/reservation/update/{id}(id=${reservation.id})}"
                      th:object="${reservation}" method="post">

                    <div class="mb-3">
                        <label class="form-label">Place</label>
                        <select th:field="*{placeId}" class="form-select" required>
                            <option th:each="p : ${places}"
                                    th:value="${p.id}"
                                    th:text="${p.building + ' - ' + p.room}"
                                    th:selected="${p.id == reservation.placeId}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Start Date & Time</label>
                        <input type="datetime-local" th:field="*{startTime}"
                               class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">End Date & Time</label>
                        <input type="datetime-local" th:field="*{endTime}"
                               class="form-control" required>
                    </div>

                    <div class="mb-3" sec:authorize="hasRole('ADMIN')"
                         xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                        <label class="form-label">Status</label>
                        <select th:field="*{cancelled}" class="form-select">
                            <option th:value="false">Active</option>
                            <option th:value="true">Cancelled</option>
                        </select>
                    </div>

                    <div class="modal-footer px-0 pb-0">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-warning">Update</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
