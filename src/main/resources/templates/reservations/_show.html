<div class="modal fade" id="showReservationModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title">Reservation Details</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p><strong>ID:</strong> <span th:text="${reservation.id}"></span></p>

                <p><strong>Student:</strong>
                    <span th:text="${reservation.studentName != null ? reservation.studentName : 'N/A'}"></span>
                    <small class="text-muted"
                           th:text="${reservation.studentUsername != null ? '(' + reservation.studentUsername + ')' : ''}">
                    </small>
                </p>

                <p><strong>Place:</strong>
                    <span th:text="${reservation.placeName != null ? reservation.placeName : 'N/A'}"></span>
                </p>

                <p><strong>Start:</strong> <span th:text="${reservation.startTime}"></span></p>
                <p><strong>End:</strong> <span th:text="${reservation.endTime}"></span></p>

                <p><strong>Status:</strong>
                    <span th:switch="${reservation.dynamicStatus}">
                        <span th:case="'Cancelled'" class="badge bg-secondary">Cancelled</span>
                        <span th:case="'Past'"      class="badge bg-dark">Past</span>
                        <span th:case="'Oncoming'"  class="badge bg-primary">Oncoming</span>
                        <span th:case="'Continues'" class="badge bg-success">In Progress</span>
                    </span>
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
