<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <title>All Reservations</title>
</head>
<body>
<div id="modal-tag"></div>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="card mx-auto mt-5" style="max-width: 1100px;">
    <div class="card-header">All Reservations</div>
    <div class="card-body">

        <div th:if="${successMessage}"
             class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${errorMessage}"
             class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <strong>Operation Failed:</strong>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <button type="button" onclick="AddReservation()"
                class="w-100 btn btn-outline-primary mb-3">
            <i class="bi bi-calendar-plus-fill"></i>&nbsp;Add Reservation
        </button>

        <table class="table table-striped table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Student</th>
                <th>Place</th>
                <th>Start</th>
                <th>End</th>
                <th>Status</th>
                <th>Operations</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${reservations}">
                <td th:text="${r.id}"></td>
                <td th:text="${r.studentName != null ? r.studentName : '-'}"></td>
                <td th:text="${r.placeName != null ? r.placeName : '-'}"></td>
                <td>
                    <i class="bi bi-clock"></i>
                    <span th:text="${#temporals.format(r.startTime, 'dd MMMM yyyy - HH:mm')}"></span>
                </td>
                <td>
                    <i class="bi bi-clock-fill"></i>
                    <span th:text="${#temporals.format(r.endTime, 'dd MMMM yyyy - HH:mm')}"></span>
                </td>

                <td>
                    <span th:switch="${r.dynamicStatus}">
                        <span th:case="'Cancelled'" class="badge bg-secondary">Cancelled</span>
                        <span th:case="'Past'"      class="badge bg-dark">Past</span>
                        <span th:case="'Oncoming'"  class="badge bg-primary">Oncoming</span>
                        <span th:case="'Continues'" class="badge bg-success">In Progress</span>
                        <span th:case="*"           class="badge bg-light text-dark"
                              th:text="${r.dynamicStatus}"></span>
                    </span>
                </td>

                <td>
                    <a href="#" th:onclick="'Details(' + ${r.id} + ')'"
                       class="btn btn-sm btn-info" title="Details">
                        <i class="bi bi-info-circle"></i>
                    </a>
                    <a href="#" th:if="${r.dynamicStatus == 'Oncoming'}"
                       th:onclick="'Update(' + ${r.id} + ')'"
                       class="btn btn-sm btn-warning" title="Update">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a href="#" th:if="${r.dynamicStatus == 'Oncoming'}"
                       th:onclick="'Cancel(' + ${r.id} + ')'"
                       class="btn btn-sm btn-danger" title="Cancel">
                        <i class="bi bi-x-circle"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>


<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="errorToast" class="toast align-items-center text-white bg-danger border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="errorToastBody"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
<script>
    function showErrorToast(msg) {
        document.getElementById('errorToastBody').textContent = msg;
        const toast = new bootstrap.Toast(document.getElementById('errorToast'));
        toast.show();
    }

    function AddReservation() {
        $.ajax({
            url: '/reservation/add', type: 'get',
            success: function (data) {
                $('#modal-tag').html(data);
                $('#modal-tag').find('.modal').modal('show');
            },
            error: function (r) {
                showErrorToast(r.status === 403
                    ? 'Access denied. You do not have permission.'
                    : 'Could not open Add Reservation form.');
            }
        });
    }

    function Details(id) {
        $.ajax({
            url: '/reservation/' + id, type: 'get',
            success: function (data) {
                $('#modal-tag').html(data);
                $('#modal-tag').find('.modal').modal('show');
            },
            error: function (r) {
                showErrorToast(r.status === 403
                    ? 'Access denied. You can only view your own reservations.'
                    : 'Could not load reservation details.');
            }
        });
    }

    function Update(id) {
        $.ajax({
            url: '/reservation/update/' + id, type: 'get',
            success: function (data) {
                $('#modal-tag').html(data);
                $('#modal-tag').find('.modal').modal('show');
            },
            error: function (r) {
                showErrorToast(r.status === 403
                    ? 'Access denied. You can only update your own reservations.'
                    : 'Could not open Update form.');
            }
        });
    }

    function Cancel(id) {
        if (!confirm('This reservation will be cancelled!\nAre you sure?')) return;
        $.ajax({
            url: '/reservation/cancel/' + id, type: 'delete',
            success: function () { window.location.replace('/reservation/all'); },
            error: function (r) {
                const msg = r.responseText
                    ? r.responseText
                    : (r.status === 403 ? 'Access denied.' : 'Cancel failed.');
                showErrorToast(msg);
            }
        });
    }
</script>
</body>
</html>
