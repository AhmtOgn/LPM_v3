<div class="modal fade" id="addStudentModal" tabindex="-1" aria-labelledby="addStudentModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="addStudentModalLabel">Yeni Öğrenci Ekle</h5>
                <!-- Çarpı (Kapatma) Butonu -->
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <!-- Form POST edildiğinde /student/add adresine gidecek -->
                <form th:action="@{/student/add}" th:object="${student}" method="post">

                    <div class="mb-3">
                        <label for="name" class="form-label">Öğrenci Adı</label>
                        <input type="text" th:field="*{name}" class="form-control" id="name" required>
                    </div>

                    <div class="mb-3">
                        <label for="department" class="form-label">Bölümü</label>
                        <input type="text" th:field="*{department}" class="form-control" id="department" required>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">İptal</button>
                        <button type="submit" class="btn btn-success">Kaydet</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
