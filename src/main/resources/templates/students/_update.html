<div class="modal fade" id="updateStudentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title">Update Student</h5>
                <!-- Closing Button -->
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">

                <form th:action="@{/student/update}" th:object="${student}" method="post" enctype="multipart/form-data">

                    <!-- Passes ID hiddenly -->
                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-3">
                        <label class="form-label">Update Profile Picture</label>
                        <input class="form-control" type="file" th:field="*{imageFile}" accept="image/*">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Student Name</label>
                        <!-- Comes contents filled-up -->
                        <input type="text" th:field="*{name}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Depatment</label>
                        <input type="text" th:field="*{department}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Usarname</label>
                        <input type="text" th:field="*{username}" class="form-control" required>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-warning">Update</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
